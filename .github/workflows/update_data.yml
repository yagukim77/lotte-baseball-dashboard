name: Update Data

permissions:
  contents: write
  
on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - run: pip install -r requirements.txt

    - name: Run Crawlers
      run: |
        python crawlers/news_crawler.py
        python crawlers/players_kbo_crawler.py
        python crawlers/schedule_kbo_crawler.py
        python crawlers/games_kbo_crawler.py

    - name: Commit Data
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add data/*.csv
        git diff --cached --quiet || git commit -m "auto update data"         
        git push
