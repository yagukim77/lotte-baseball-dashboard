name: Update Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install packages
        run: |
          pip install pandas
          pip install requests
          pip install beautifulsoup4
          pip install lxml

      - name: Create data folder
        run: |
          mkdir -p data

      - name: Run crawlers
        run: |
          python crawlers/news_crawler.py
          python crawlers/players_kbo_crawler.py
          python crawlers/schedule_kbo_crawler.py
          python crawlers/games_kbo_crawler.py
          python crawlers/standings_kbo_crawler.py

      - name: Commit files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data
          git commit -m "auto update data" || echo "no changes"
          git push
