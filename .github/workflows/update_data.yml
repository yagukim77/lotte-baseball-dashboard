name: update-data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Crawl players
        run: python crawlers/kbo_players.py
        continue-on-error: true

      - name: Crawl pitchers
        run: python crawlers/kbo_pitchers.py
        continue-on-error: true

      - name: Crawl standings
        run: python crawlers/standings_kbo_crawler.py
        continue-on-error: true

      - name: Crawl games
        run: python crawlers/kbo_games.py
        continue-on-error: true

      - name: Crawl schedule
        run: python crawlers/kbo_schedule.py
        continue-on-error: true

      - name: Crawl team stats
        run: python crawlers/kbo_team_stats.py
        continue-on-error: true

      - name: Crawl monthly schedule
        run: python crawlers/kbo_monthly_schedule.py
        continue-on-error: true

      - name: Crawl probable starters
        run: python crawlers/kbo_probable_starters.py
        continue-on-error: true

      - name: Crawl live score
        run: python crawlers/live_score.py
        continue-on-error: true

      - name: Crawl news
        run: python crawlers/news_crawler.py
        continue-on-error: true

      - name: Commit updated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.csv || true
          git commit -m "auto: update baseball data" || echo "No changes to commit"
          git push
