name: Update Data

permissions:
  contents: write

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  update:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Set Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install packages
      run: |
        pip install -r requirements.txt

    - name: Run News Crawler
      run: |
        python crawlers/news_crawler.py

    - name: Run Standings Crawler
      run: |
        python crawlers/standings_crawler.py

    - name: Run Players Crawler
      run: |
        python crawlers/players_crawler.py

    - name: Run Schedule Crawler
      run: |
        python crawlers/schedule_crawler.py

    - name: Run Games Crawler
      run: |
        python crawlers/games_crawler.py

    - name: Run Schedule_Crawler
      run: |
        python crawlers/schedule_crawler.py

    - name: Commit files
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add .
        git commit -m "auto data update" || echo "no changes"
        git push
