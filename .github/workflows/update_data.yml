name: update-data-safe

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21,1,5,9 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Run crawlers
        run: |
          set +e

              python crawlers/kbo_players.py
              python crawlers/kbo_pitchers.py
              python crawlers/kbo_schedule.py
              python crawlers/live_score.py
              python crawlers/kbo_games.py
              python crawlers/kbo_team_stats.py
              python crawlers/kbo_standings.py
              python crawlers/kbo_probable_starters.py || true
              python crawlers/news_crawler.py || true

      - name: Create missing CSVs if absent
        run: |
          python - <<'PY'
          import os
          import pandas as pd

          os.makedirs("data", exist_ok=True)

          required_files = {
              "data/players_stats.csv": ["player", "team", "avg", "hr", "rbi", "ops"],
              "data/pitcher_stats.csv": ["player", "team", "era", "game", "win", "lose", "save"],
              "data/kbo_standings.csv": ["rank", "team", "games", "win", "lose", "draw", "win_rate", "gb", "avg", "era"],
              "data/games.csv": ["date", "home", "away", "runs", "allowed", "result"],
              "data/schedule.csv": ["date", "home", "away", "stadium", "time", "away_score", "home_score", "result", "status", "season_type"],
              "data/monthly_schedule.csv": ["date", "away", "home", "time", "stadium", "status", "season_type", "away_score", "home_score"],
              "data/probable_starters.csv": ["date", "home", "away", "home_starter", "away_starter"],
              "data/news.csv": ["title", "link"],
              "data/live_score.csv": ["date", "away", "home", "away_score", "home_score", "status"],
              "data/team_stats.csv": ["team", "avg", "era", "team_ops"],
          }

          for path, cols in required_files.items():
              if not os.path.exists(path):
                  pd.DataFrame(columns=cols).to_csv(path, index=False, encoding="utf-8-sig")
                  print(f"created empty csv: {path}")
          PY

      - name: Show generated CSV files
        run: |
          ls -lah data || true
          for f in data/*.csv; do
            echo "----- $f -----"
            head -n 5 "$f" || true
          done

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add data/*.csv

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update baseball data"
            git push
          fi
