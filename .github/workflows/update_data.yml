name: update-data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawlers
        run: |
          python crawlers/kbo_players.py
          python crawlers/kbo_pitchers.py
          python crawlers/kbo_standings.py
          python crawlers/kbo_games.py
          python crawlers/kbo_schedule.py
          python crawlers/kbo_team_stats.py
          python crawlers/kbo_monthly_schedule.py
          python crawlers/kbo_probable_starters.py
          python crawlers/live_score.py
          python crawlers/news_crawler.py
          python crawlers/youtube_highlight.py||true

      - name: Commit updated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.csv
          git commit -m "auto: update baseball data" || echo "No changes to commit"
          git push
